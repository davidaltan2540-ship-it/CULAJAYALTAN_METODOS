<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar Culajay</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body style="background: linear-gradient(135deg, #e0f0ff, #f8f0ff);">

    <div class="text-white py-5 mb-5 shadow" style="background: linear-gradient(90deg, #0d6efd, #6f42c1);">
        <div class="container text-center">
            <span class="fs-1">&#128663;</span>
            <h1 class="display-5 fw-bold mt-2">Vamos a buscar vehículos</h1>
            <p class="lead mb-0">Ingresa los datos del vehículo que deseas buscar</p>
        </div>
    </div>

    <div class="container d-flex justify-content-center">
        <div class="card shadow w-100 border-0" style="max-width: 500px;">

            <div class="card-header text-white fw-bold fs-5 text-center" style="background-color: #6f42c1;">
                &#128269; Filtros de búsqueda
            </div>

            <div class="card-body p-4">
                <form action="resultados.php" method="GET">

                    <div class="mb-3">
                        <label for="marca" class="form-label fw-semibold text-primary">Marca:</label>
                        <input type="text" id="marca" name="marca" class="form-control border-primary" placeholder="Ej. Toyota, Ford...">
                    </div>

                    <div class="mb-3">
                        <label for="modelo" class="form-label fw-semibold text-success">Modelo:</label>
                        <select id="modelo" name="modelo" class="form-select border-success">
                            <option value="">Selecciona un modelo</option>
                            <option value="sedan">Sedán</option>
                            <option value="suv">SUV</option>
                            <option value="hatchback">Hatchback</option>
                            <option value="pickup">Pickup</option>
                            <option value="coupe">Coupé</option>
                            <option value="convertible">Convertible</option>
                            <option value="minivan">Minivan</option>
                            <option value="van">Van</option>
                            <option value="crossover">Crossover</option>
                            <option value="camioneta">Camioneta</option>
                            <option value="deportivo">Deportivo</option>
                            <option value="electrico">Eléctrico</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label for="color" class="form-label fw-semibold text-danger">Color:</label>
                        <select id="color" name="color" class="form-select border-danger">
                            <option value="">Selecciona un color</option>
                            <option value="rojo">Rojo</option>
                            <option value="azul">Azul</option>
                            <option value="negro">Negro</option>
                            <option value="blanco">Blanco</option>
                            <option value="verde">Verde</option>
                            <option value="amarillo">Amarillo</option>
                            <option value="naranja">Naranja</option>
                            <option value="gris">Gris</option>
                            <option value="plateado">Plateado</option>
                        </select>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-lg text-white fw-bold" style="background: linear-gradient(90deg, #0d6efd, #6f42c1);">
                            &#128269; Buscar vehículo
                        </button>
                    </div>

                </form>
            </div>

            <div class="card-footer text-center text-muted small" style="background-color: #f0e6ff;">
                Sistema de búsqueda de vehículos &mdash; Culajay Altán Josué David
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
